# Alembic 配置文件

[alembic]
# 迁移脚本位置
script_location = migrations

# 数据库 URL（从环境变量读取）
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/ticket_system

# 模板路径
# file_template = %%(rev)s_%%(slug)s

# 时区
timezone = Asia/Shanghai

# 编码
encoding = utf-8

# 输出编码
output_encoding = utf-8

# 版本表名
version_table = alembic_version

# 版本表 schema
# version_table_schema = public

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
