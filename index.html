<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍿 零食铺子</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">🍿 零食铺子</h1>
      <div class="auth-header" id="authContainer"></div>
      <button class="staff-toggle" id="staffToggle" onclick="window._snack.toggleStaffMode()">👤 管理</button>
      <button class="orders-btn" onclick="window._snack.openOrders()">📋 订单</button>
      <button class="cart-btn" onclick="window._snack.toggleCart()">
        🛒 购物车
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <!-- Promo Banner -->
  <div class="promo-banner" id="promoBanner" style="display:none">
    <div class="container promo-inner">
      <span id="promoText"></span>
      <button class="promo-close" onclick="window._snack.closePromo()">✕</button>
    </div>
  </div>

  <!-- Search + Filter Bar -->
  <div class="search-filter-bar">
    <div class="container filter-inner">
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索零食..." oninput="window._snack.search()">
        </div>
        <select id="sortSelect" class="sort-select" onchange="window._snack.setSort(this.value)">
          <option value="default">默认排序</option>
          <option value="price-asc">价格 ↑</option>
          <option value="price-desc">价格 ↓</option>
          <option value="name">名称 A-Z</option>
        </select>
      </div>
      <div class="filter-tags">
        <button class="tag-btn active" data-cat="全部" onclick="window._snack.filterCat('全部')">全部</button>
        <button class="tag-btn" data-cat="糖果" onclick="window._snack.filterCat('糖果')">🍬 糖果</button>
        <button class="tag-btn" data-cat="饼干" onclick="window._snack.filterCat('饼干')">🍪 饼干</button>
        <button class="tag-btn" data-cat="坚果" onclick="window._snack.filterCat('坚果')">🥜 坚果</button>
        <button class="tag-btn" data-cat="巧克力" onclick="window._snack.filterCat('巧克力')">🍫 巧克力</button>
        <button class="tag-btn" data-cat="饮料" onclick="window._snack.filterCat('饮料')">🥤 饮料</button>
        <button class="tag-btn" data-cat="果冻" onclick="window._snack.filterCat('果冻')">🍮 果冻</button>
      </div>
    </div>
  </div>

  <!-- Favorites Section -->
  <div class="container">
    <div class="favorites-section" id="favoritesSection" style="display:none">
      <div class="fav-header" onclick="window._snack.toggleFavSection()">
        <span>⭐ 收藏的零食</span>
        <span class="fav-toggle" id="favToggle">▼</span>
      </div>
      <div class="fav-grid" id="favGrid"></div>
    </div>
  </div>

  <!-- Staff Dashboard -->
  <div class="staff-dashboard" id="staffDashboard" style="display:none">
    <div class="container">
      <div class="staff-tabs">
        <button class="staff-tab active" data-tab="orders" onclick="window._snack.switchStaffTab('orders')">📋 订单队列</button>
        <button class="staff-tab" data-tab="stock" onclick="window._snack.switchStaffTab('stock')">📦 库存管理</button>
        <button class="staff-tab" data-tab="specials" onclick="window._snack.switchStaffTab('specials')">🔥 特价管理</button>
      </div>
      <!-- Orders Panel -->
      <div id="staffOrdersPanel" class="staff-panel">
        <div class="order-filter-tabs">
          <button class="order-filter-tab active" data-status="all" onclick="window._snack.filterOrders('all')">全部</button>
          <button class="order-filter-tab" data-status="received" onclick="window._snack.filterOrders('received')">已接收</button>
          <button class="order-filter-tab" data-status="preparing" onclick="window._snack.filterOrders('preparing')">准备中</button>
          <button class="order-filter-tab" data-status="ready" onclick="window._snack.filterOrders('ready')">已完成</button>
        </div>
        <div id="staffOrderList"></div>
      </div>
      <!-- Stock Panel -->
      <div id="staffStockPanel" class="staff-panel" style="display:none">
        <div id="stockManagement"></div>
      </div>
      <!-- Specials Panel -->
      <div id="staffSpecialsPanel" class="staff-panel" style="display:none">
        <div id="specialsManagement"></div>
      </div>
    </div>
  </div>

  <!-- Product Grid -->
  <main class="container">
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- Bottom Cart Bar -->
  <div class="cart-bar" id="cartBar">
    <div class="container cart-bar-inner">
      <span class="cart-tip">已选 <strong id="cartCountBar">0</strong> 件</span>
      <span class="cart-total-label">合计：<strong id="cartTotalBar">¥0.00</strong></span>
      <button class="btn-settle" id="btnSettle" onclick="window._snack.openCheckout()" disabled>去结算</button>
    </div>
  </div>

  <!-- Cart Drawer Overlay -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="window._snack.toggleCart()"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="drawer-header">
      <h3>🛒 购物车</h3>
      <button class="drawer-close" onclick="window._snack.toggleCart()">✕</button>
    </div>
    <div class="drawer-items" id="drawerItems"></div>
    <div class="drawer-footer">
      <div class="drawer-total">
        <span>总计：</span>
        <span class="drawer-price" id="drawerTotal">¥0.00</span>
      </div>
      <div class="drawer-btns">
        <button class="btn-clear" onclick="window._snack.clearCart()">清空</button>
        <button class="btn-checkout" id="btnCheckout" onclick="window._snack.openCheckout()" disabled>去结算</button>
      </div>
    </div>
  </aside>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="window._snack.closeCheckout()"></div>
  <div class="modal checkout-modal" id="checkoutModal">
    <div class="modal-header">
      <h3>📋 填写订单信息</h3>
      <button class="modal-close" onclick="window._snack.closeCheckout()">✕</button>
    </div>
    <form class="checkout-form" id="checkoutForm" onsubmit="window._snack.submitOrder(event)">
      <div class="form-group">
        <label for="fName">姓名 <span class="required">*</span></label>
        <input type="text" id="fName" placeholder="请输入收货人姓名" maxlength="20">
        <span class="error-msg" id="errName"></span>
      </div>
      <div class="form-group">
        <label for="fPhone">手机号 <span class="required">*</span></label>
        <input type="tel" id="fPhone" placeholder="请输入11位手机号" maxlength="11">
        <span class="error-msg" id="errPhone"></span>
      </div>
      <div class="form-group">
        <label for="fAddress">收货地址 <span class="required">*</span></label>
        <textarea id="fAddress" placeholder="请输入详细收货地址" rows="2" maxlength="100"></textarea>
        <span class="error-msg" id="errAddress"></span>
      </div>
      <div class="form-summary">
        共 <strong id="summaryCount">0</strong> 件，合计 <strong id="summaryTotal">¥0.00</strong>
      </div>
      <button type="submit" class="btn-submit">确认提交订单</button>
    </form>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successOverlay"></div>
  <div class="modal success-modal" id="successModal">
    <div class="success-icon">🎉</div>
    <h3>下单成功！</h3>
    <p class="order-num" id="orderNum"></p>
    <div class="order-items" id="orderItems"></div>
    <p class="success-note">感谢您的惠顾，美味马上送到！🍭</p>
    <button class="btn-submit" onclick="window._snack.closeSuccess()">继续购物</button>
  </div>

  <!-- Orders Modal -->
  <div class="modal-overlay" id="ordersOverlay" onclick="window._snack.closeOrders()"></div>
  <div class="modal orders-modal" id="ordersModal">
    <div class="modal-header">
      <h3>📋 我的订单</h3>
      <button class="modal-close" onclick="window._snack.closeOrders()">✕</button>
    </div>
    <div id="ordersList"></div>
  </div>

  <!-- Modifier Picker Modal -->
  <div class="modal-overlay" id="modifierOverlay" onclick="window._snack.closeModifier()"></div>
  <div class="modal modifier-modal" id="modifierModal">
    <div class="modal-header">
      <h3>🔧 选择规格</h3>
      <button class="modal-close" onclick="window._snack.closeModifier()">✕</button>
    </div>
    <div id="modifierBody"></div>
  </div>

  <!-- ===== Login Modal ===== -->
  <div class="modal-overlay" id="loginOverlay" onclick="window._snack.closeLogin()"></div>
  <div class="modal auth-modal" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
    <div class="modal-header">
      <h3 id="loginModalTitle">🔑 登录</h3>
      <button class="modal-close" onclick="window._snack.closeLogin()" aria-label="关闭登录">✕</button>
    </div>
    <form class="auth-form" id="loginForm" onsubmit="window._snack.submitLogin(event)">
      <div class="form-group">
        <label for="loginUsername">用户名 <span class="required">*</span></label>
        <input type="text" id="loginUsername" placeholder="请输入用户名" maxlength="20" required aria-required="true">
      </div>
      <div class="form-group">
        <label for="loginPassword">密码 <span class="required">*</span></label>
        <input type="password" id="loginPassword" placeholder="请输入密码" maxlength="30" required aria-required="true">
      </div>
      <button type="submit" class="btn-submit">登录</button>
      <p class="auth-switch">
        还没有账号？<a href="javascript:void(0)" onclick="window._snack.closeLogin();window._snack.openRegister()">立即注册</a>
      </p>
    </form>
  </div>

  <!-- ===== Register Modal ===== -->
  <div class="modal-overlay" id="registerOverlay" onclick="window._snack.closeRegister()"></div>
  <div class="modal auth-modal" id="registerModal" role="dialog" aria-modal="true" aria-labelledby="registerModalTitle">
    <div class="modal-header">
      <h3 id="registerModalTitle">📝 注册</h3>
      <button class="modal-close" onclick="window._snack.closeRegister()" aria-label="关闭注册">✕</button>
    </div>
    <form class="auth-form" id="registerForm" onsubmit="window._snack.submitRegister(event)">
      <div class="form-group">
        <label for="regUsername">用户名 <span class="required">*</span></label>
        <input type="text" id="regUsername" placeholder="请输入用户名（至少2个字符）" maxlength="20" required aria-required="true">
      </div>
      <div class="form-group">
        <label for="regPassword">密码 <span class="required">*</span></label>
        <input type="password" id="regPassword" placeholder="请输入密码（至少6个字符）" maxlength="30" required aria-required="true">
      </div>
      <div class="form-group">
        <label for="regConfirmPassword">确认密码 <span class="required">*</span></label>
        <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" maxlength="30" required aria-required="true">
      </div>
      <button type="submit" class="btn-submit">注册</button>
      <p class="auth-switch">
        已有账号？<a href="javascript:void(0)" onclick="window._snack.closeRegister();window._snack.openLogin()">立即登录</a>
      </p>
    </form>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
